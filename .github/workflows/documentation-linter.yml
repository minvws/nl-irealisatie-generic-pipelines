name: lint documentation
on:
  pull_request:
    paths:
      - '**.md'
jobs:
  mdlint:
    name: lint markDown file
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: DavidAnson/markdownlint-cli2-action@v23
      with:
        globs: '**/*.md'
        config: .markdownlint.json
